<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6ee7b7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <!-- Decorative circles -->
  <circle cx="150" cy="150" r="200" fill="rgba(16,185,129,0.1)"/>
  <circle cx="1050" cy="480" r="250" fill="rgba(52,211,153,0.08)"/>
  <!-- Logo Icon -->
  <g transform="translate(480, 200)">
    <rect x="0" y="0" width="240" height="180" rx="20" fill="none" stroke="url(#brandGrad)" stroke-width="8"/>
    <circle cx="70" cy="80" r="20" fill="#6ee7b7"/>
    <circle cx="170" cy="80" r="20" fill="#34d399"/>
    <circle cx="120" cy="130" r="20" fill="#a7f3d0"/>
    <line x1="50" y1="0" x2="50" y2="-30" stroke="#6ee7b7" stroke-width="6" stroke-linecap="round"/>
    <line x1="120" y1="0" x2="120" y2="-50" stroke="#34d399" stroke-width="6" stroke-linecap="round"/>
    <line x1="190" y1="0" x2="190" y2="-30" stroke="#a7f3d0" stroke-width="6" stroke-linecap="round"/>
  </g>
  <!-- Text -->
  <text x="600" y="480" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">
    <tspan fill="#10b981">Mine</tspan><tspan fill="#34d399">Fun</tspan>
  </text>
  <text x="600" y="540" font-family="Arial, sans-serif" font-size="28" fill="#a3a3a3" text-anchor="middle">
    Free Online H5 Games
  </text>
</svg>
